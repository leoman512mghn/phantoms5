<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOMS | Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 1; }
        .admin-login-box { max-width: 400px; width: 100%; }
        .admin-login-box .lock-icon {
            width: 64px; height: 64px;
            border-radius: 50%;
            background: rgba(168,85,247,0.08);
            border: 1px solid rgba(168,85,247,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 26px;
            color: var(--primary);
        }
        .admin-login-box .lock-icon i { animation: lockPulse 2s ease-in-out infinite; }
        @keyframes lockPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<div class="admin-login-wrapper">
    <div class="form-wrapper admin-login-box">
        <div class="lock-icon"><i class="fas fa-lock"></i></div>
        <div class="form-logo"><i class="fas fa-ghost"></i> ADMIN</div>
        <p class="form-subtitle">لوحة تحكم المسؤول — دخول مقيد</p>
        <div class="form-error" id="adminLoginError"></div>
        <form id="adminLoginForm">
            <div class="form-group">
                <label>اسم المسؤول <span class="required">*</span></label>
                <input type="text" id="adminUser" placeholder="Admin username" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور <span class="required">*</span></label>
                <input type="password" id="adminPass" placeholder="Admin password" required>
            </div>
            <button type="submit" class="form-submit" id="adminLoginBtn"><i class="fas fa-lock"></i> دخول المسؤول</button>
        </form>
        <div class="form-footer">
            <a href="index.html" style="color:#55406a;"><i class="fas fa-arrow-right"></i> العودة للموقع</a>
        </div>
    </div>
</div>

<script src="js/admin-auth.js"></script>
</body>
</html>

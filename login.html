<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOMS | تسجيل دخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<canvas id="particles-canvas"></canvas>

<nav>
    <div class="logo"><i class="fas fa-ghost"></i> PHANTOMS</div>
    <ul>
        <li><a href="index.html">الرئيسية</a></li>
        <li class="nav-guest"><a href="register.html">تسجيل</a></li>
        <li class="nav-guest"><a href="login.html" class="active">دخول</a></li>
        <li><a href="dashboard.html">لوحة العضو</a></li>
        <li class="nav-guest nav-cta-li"><a href="register.html" class="nav-cta">انضم إلينا</a></li>
        <li class="nav-user" style="display:none;"><a href="#" id="navLogout" style="color:#ef4444;"><i class="fas fa-right-from-bracket"></i> <span class="nav-user-name"></span></a></li>
    </ul>
    <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
</nav>

<div class="page-hero">
    <div class="hero-content" style="padding: 20px;">
        <div class="hero-badge"><i class="fas fa-right-to-bracket"></i> تسجيل دخول</div>
        <h1 style="font-family:'Orbitron',monospace;font-size:36px;letter-spacing:2px;text-transform:uppercase;">
            مرحباً <span class="gradient">بالعودة</span>
        </h1>
    </div>
</div>

<section style="padding-top:0;">
    <div class="form-wrapper">
        <div class="form-logo"><i class="fas fa-ghost"></i> PHANTOMS</div>
        <p class="form-subtitle">سجل دخولك لمتابعة طلب التقديم</p>
        <div class="form-error" id="loginError"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>اسم المستخدم أو البريد <span class="required">*</span></label>
                <input type="text" id="loginUser" placeholder="اسم المستخدم أو البريد الإلكتروني" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور <span class="required">*</span></label>
                <input type="password" id="loginPassword" placeholder="كلمة المرور" required>
            </div>
            <button type="submit" class="form-submit" id="loginBtn"><i class="fas fa-right-to-bracket"></i> تسجيل الدخول</button>
        </form>
        <div class="form-footer">
            ماعندك حساب؟ <a href="register.html">أنشئ واحد</a>
        </div>
    </div>
</section>

<footer>
    <div class="footer-logo"><i class="fas fa-ghost"></i> PHANTOMS</div>
    <p>حيث القوة تلتقي بالولاء — عصابة الفانتوم</p>
    <div class="footer-links">
        <a href="index.html">الرئيسية</a>
        <a href="register.html">تسجيل</a>
        <a href="login.html">دخول</a>
    </div>
    <p class="copyright">&copy; 2026 PHANTOMS</p>
</footer>

<div class="toast" id="toast"></div>

<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
